<aside class="sidebar">
    <div class="sidebar_logo">
      <span class="sidebar_logo-name">Retirement Goal Planner</span>
    </div>

    <nav class="sidebar_nav">
      <a routerLink="/dashboard" routerLinkActive="sidebar_link--active" class="sidebar_link">Dashboard</a>
      <a routerLink="/goals" routerLinkActive="sidebar_link--active" class="sidebar_link">Goals</a>
      <a routerLink="/sources" routerLinkActive="sidebar_link--active" class="sidebar_link">Funding Sources</a>
      <a routerLink="/contributions" routerLinkActive="sidebar_link--active" class="sidebar_link">Contributions</a>
      <a routerLink="/profile" routerLinkActive="sidebar_link--active" class="sidebar_link">Profile</a>
    </nav>

    <div class="sidebar_user">
      <span class="sidebar_avatar">{{ userName() ? userName().charAt(0).toUpperCase() : 'U' }}</span>
      <div>
        <div class="sidebar_user-name">{{ userName() || 'User' }}</div>
        <a class="sidebar_signout" (click)="logout()">Sign out</a>
      </div>
    </div>
  </aside>
