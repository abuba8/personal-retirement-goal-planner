<aside class="sidebar">
  <div class="sidebar_logo">
    <span class="sidebar_logo-name">Retirement Goal Planner</span>
  </div>

  <nav class="sidebar_nav">
    <a routerLink="/dashboard" routerLinkActive="sidebar_link--active" class="sidebar_link">
      <i class="pi pi-th-large"></i>
      <span>Dashboard</span>
    </a>
    <a routerLink="/goals" routerLinkActive="sidebar_link--active" class="sidebar_link">
      <i class="pi pi-bullseye"></i>
      <span>Goals</span>
    </a>
    <a routerLink="/sources" routerLinkActive="sidebar_link--active" class="sidebar_link">
      <i class="pi pi-building-columns"></i>
      <span>Funding Sources</span>
    </a>
    <a routerLink="/contributions" routerLinkActive="sidebar_link--active" class="sidebar_link">
      <i class="pi pi-list"></i>
      <span>Contributions</span>
    </a>
    <a routerLink="/profile" routerLinkActive="sidebar_link--active" class="sidebar_link">
      <i class="pi pi-user"></i>
      <span>Profile</span>
    </a>
  </nav>

  <div class="sidebar_user">
    <span class="sidebar_avatar">{{ userName() ? userName().charAt(0).toUpperCase() : 'U' }}</span>
    <div>
      <div class="sidebar_user-name">{{ userName() || 'User' }}</div>
      <a class="sidebar_signout" (click)="logout()">Sign out</a>
    </div>
  </div>
</aside>
