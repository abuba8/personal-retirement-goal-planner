<p-dialog
    [header]="title()"
    [modal]="true"
    [(visible)]="visible"
    [style]="{width: '40rem', height: '40rem'}"
>
    <form [formGroup]="form" (ngSubmit)="saveSource()">
        <div>
            <input id="source-name" formControlName="name" type="text" />
            <label for="source-name">Name</label>
            @if (form.get("name")?.invalid && form.get("name")?.touched) {
                <small class="p-error">Name is required</small>
            }
        </div>
        <div>
            <input id="source-institution" formControlName="institution" type="text" />
            <label for="source-institution">Institution</label>
        </div>
        <div>
            <input id="source-notes" formControlName="notes" type="text" />
            <label for="source-notes">Notes</label>
        </div>
        <div>
            <p-select
                id="source-type"
                formControlName="type"
                [options]="sourceTypeOptions"
                optionLabel="label"
                optionValue="value"
            ></p-select>
            <label for="source-type">Source Type</label>
            @if (form.get("type")?.invalid && form.get("type")?.touched) {
                <small class="p-error">Must pick a valid Source Type</small>
            }
        </div>

        <p-button
            label="Cancel"
            type="button"
            severity="secondary"
            [outlined]="true"
            (onClick)="cancel()"
            class="p-2 w-full"
        />

        <p-button
            label="Save"
            type="submit"
            [disabled]="form.invalid"
            class="p-2 w-full"
        />
    </form>
</p-dialog>
