@if (visible()) {
  <div>
    <p>
      Are you sure you want to delete <strong>{{ recordName() }}</strong>?
      This action cannot be undone.
    </p>
    <button type="button" (click)="cancelled.emit()">Cancel</button>
    <button type="button" (click)="confirmed.emit()">Delete</button>
  </div>
}
