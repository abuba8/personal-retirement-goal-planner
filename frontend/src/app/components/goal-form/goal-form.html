<h2>{{ editingId() ? "Edit goal" : "New goal" }}</h2>

<form [formGroup]="form" (ngSubmit)="submit()">
  <div>
    <label>Name</label>
    <input type="text" formControlName="name" />
  </div>
  <div>
    <label>Target retirement age</label>
    <input type="number" formControlName="targetRetirementAge" />
  </div>
  <div>
    <label>Target amount</label>
    <input type="number" step="0.01" formControlName="targetAmount" />
  </div>
  <div>
    <label>Notes</label>
    <textarea formControlName="notes"></textarea>
  </div>

  @if (error()) { <p>{{ error() }}</p> }

  <button type="submit" [disabled]="loading()">
    {{ loading() ? "Saving..." : "Save" }}
  </button>
  <a routerLink="/goals"><button type="button">Cancel</button></a>
</form>
