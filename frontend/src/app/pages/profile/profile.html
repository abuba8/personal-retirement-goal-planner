<div class="dash">
  <app-side-bar />


  <main class="main">
    <h1 class="font-display page_title">Profile</h1>

    <div class="card">

      <!-- card header: avatar + name + email -->
      <div class="card_head">
        <span class="card_avatar">{{ initials() }}</span>
        <div>
          <div class="card_name">{{ userName() || 'User' }}</div>
          <div class="card_email">{{ userEmail() }}</div>
        </div>
      </div>

      <form [formGroup]="form" (ngSubmit)="save()" class="form">

        <!-- full name (= username) -->
        <div class="field">
          <label for="username" class="field_label">Username</label>
          <input id="username" type="text" formControlName="username" class="field_input" />
        </div>

        <!-- email -->
        <div class="field">
          <label for="email" class="field_label">Email address</label>
          <input id="email" type="email" formControlName="email" class="field_input" />
        </div>

        <!-- new password (delete this block if you want to match the mockup exactly) -->
        <div class="field">
          <label for="password" class="field_label">New password</label>
          <input id="password" type="password" formControlName="password" class="field_input"
                 placeholder="Leave blank to keep current" />
        </div>

        <!-- messages -->
        @if (info())  { <p class="msg msg--ok">{{ info() }}</p> }
        @if (error()) { <p class="msg msg--bad">{{ error() }}</p> }

        <!-- buttons -->
        <div class="actions">
          <button type="submit" class="btn btn--primary" [disabled]="loading()">
            {{ loading() ? 'Saving…' : 'Save changes' }}
          </button>
          <button type="button" class="btn btn--danger" (click)="logout()">Sign out</button>
          <button type="button" class="btn btn--danger" (click)="confirmDelete()">Delete account</button>
          <p-confirmdialog />

        </div>
      </form>
    </div>
  </main>
</div>
