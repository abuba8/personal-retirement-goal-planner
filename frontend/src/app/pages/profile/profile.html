<div class="dash">

  <aside class="sidebar">
    <div class="sidebar_logo">
      <span class="sidebar_logo-name">Retirement Goal Planner</span>
    </div>

    <nav class="sidebar_nav">
      <a routerLink="/dashboard" class="sidebar_link">Dashboard</a>
      <a routerLink="/goals" class="sidebar_link">Goals</a>
      <a routerLink="/sources" class="sidebar_link">Funding Sources</a>
      <a routerLink="/contributions" class="sidebar_link">Contributions</a>
      <a routerLink="/profile" class="sidebar_link sidebar_link--active">Profile</a>
    </nav>

    <div class="sidebar_user">
      <span class="sidebar_avatar">{{ userName() ? userName().charAt(0).toUpperCase() : 'U' }}</span>
      <div>
        <div class="sidebar_user-name">{{ userName() || 'User' }}</div>
        <a class="sidebar_signout" (click)="logout()">Sign out</a>
      </div>
    </div>
  </aside>

  <main class="main">
    <h2>Your profile</h2>

    <form [formGroup]="form" (ngSubmit)="save()">
      <div>
        <label>Username</label>
        <input type="text" formControlName="username" />
      </div>
      <div>
        <label>Email</label>
        <input type="email" formControlName="email" />
      </div>
      <div>
        <label>New password (leave blank to keep current)</label>
        <input type="password" formControlName="password" />
      </div>

      @if (info())  { <p>{{ info() }}</p> }
      @if (error()) { <p>{{ error() }}</p> }

      <button type="submit" [disabled]="loading()">
        {{ loading() ? "Saving..." : "Save changes" }}
      </button>
    </form>

    <hr />
    <button type="button" (click)="deleteAccount()">Delete account</button>

    
  </main>
</div>
