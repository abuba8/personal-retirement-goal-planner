<div class="dash">
  <app-side-bar />

  <a routerLink="/goals">&larr; Back to your Goals</a>

  @if (goal(); as currentGoal) {
    <div>
      <h2>{{ currentGoal.name }}</h2>
      <p>Target Retirement Age: {{ currentGoal.targetRetirementAge }}</p>
      <p>Target Amount: {{ currentGoal.targetAmount | currency }}</p>
      <p>Notes: {{ currentGoal.notes }}</p>
      <app-contribution-summary 
        [totalContributed]="totalContributed()"
        [contributionCount]="contributionCount()"
      />

      <p-button label="Edit" icon="pi pi-pen-to-square" (click)="showDialog.set(true)" />
      <p-button label="Delete" icon="pi pi-trash" severity="danger" [outlined]="true" (click)="handleDeleteGoal()" />
    </div>
  }

  <app-goal-form
    [(visible)]="showDialog"
    [goal]="goal()"
    (save)="handleSaveGoal($event)"
  />

  <p-confirmdialog />

  <h3>Contributions</h3>
  <app-contribution-table
      variant="compact"
      [contributions]="allContributions()"
      [totalContributions]="totalContributions()"
      [showSourceColumn]="true"
      [showGoalColumn]="false"
      [allSources]="allSources()"
      (lazyLoad)="loadContributions($event)"
      (create)="handleCreateContribution()"
      (edit)="handleUpdateContribution($event)"
      (delete)="handleDeleteContribution($event)"
  />

  <app-contribution-form
      [(visible)]="showContributionDialog"
      [contribution]="contribution()"
      [allSources]="allSources()"
      [lockedGoalId]="goalId"
      (createdSource)="allSources.update(currentList => [...currentList, $event])"
      (save)="handleSaveContribution($event)"
  />
</div>
