<div class="dash">

  <app-side-bar />

  <main class="main">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="goals_title">Retirement Goals</h1>
        <p>The milestones you're funding toward.</p>
      </div>
      <p-button label="+ Add Goal" styleClass="goals_create-btn" (click)="handleCreateGoal()" />
    </div>

    @if (loading()) { <p>Loading...</p> }
    @if (error())   { <p>{{ error() }}</p> }

    <div class="goal-card-grid">
      @for (goal of allGoals(); track goal.id) {
        <app-goal-card
          [goal]="goal"
          (open)="goToGoal($event)"
          (edit)="handleUpdateGoal($event)"
          (delete)="handleDeleteGoal($event)"
        />
      } @empty {
        <p>No goals yet.</p>
      }
    </div>

    <app-goal-form
      [(visible)]="showGoalDialog"
      [goal]="selectedGoal()"
      (save)="handleSaveGoal($event)"
    />
    <p-confirmDialog />

  </main>
</div>
