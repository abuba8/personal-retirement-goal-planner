<div class="auth-shell">
  <!-- LEFT: promo panel -->
  <app-home-page />

  <!-- RIGHT: the form -->
  <main class="auth-panel">
    <div class="auth-form">
      <div class="mb-8">
        <h1 class="font-display text-4xl font-semibold" style="color: var(--primary-ink);">
          Welcome back
        </h1>
        <p class="mt-2 text-base" style="color: var(--muted-text);">
          Sign in to your account.
        </p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-5">
        <!-- Identifier -->
        <div class="flex flex-col gap-2">
          <label for="identifier" class="text-xs font-semibold tracking-wide uppercase"
                 style="color: var(--muted-text);">Email</label>
          <input pInputText id="identifier" formControlName="identifier"
                 autocomplete="username" placeholder="you@email.com" class="w-full" />
          @if (form.get('identifier')?.touched && form.get('identifier')?.invalid) {
            <small style="color: var(--error-accent);">This field is required.</small>
          }
        </div>

        <!-- Password -->
        <div class="flex flex-col gap-2">
          <label for="password" class="text-xs font-semibold tracking-wide uppercase"
                 style="color: var(--muted-text);">Password</label>
          <p-password inputId="password" formControlName="password" [feedback]="false"
                      [toggleMask]="true" placeholder="••••••••"
                      styleClass="w-full" [inputStyleClass]="'w-full'" />
          @if (form.get('password')?.touched && form.get('password')?.invalid) {
            <small style="color: var(--error-accent);">Password is required.</small>
          }
        </div>

        @if (error()) {
          <p-message severity="error" [text]="error()!" styleClass="w-full" />
        }

        <p-button type="submit" [label]="loading() ? 'Signing in…' : 'Sign in'"
                  [loading]="loading()" [disabled]="loading()"
                  styleClass="w-full auth-submit mt-1" />
      </form>

      <p class="mt-6 text-center text-sm" style="color: var(--muted-text);">
        Don't have an account?
        <a routerLink="/register" class="font-semibold" style="color: var(--primary);">Register</a>
      </p>
    </div>
  </main>
</div>
