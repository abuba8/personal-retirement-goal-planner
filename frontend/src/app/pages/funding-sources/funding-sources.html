<h2>Funding Source Component</h2>

<p-table 
    [value]="allSources()"
    selectionMode="single"
    [(selection)]="selectedSource" 
    [paginator]="true" 
    [rows]="10"
    [tableStyle]="{'min-width': '50rem'}"
    [totalRecords]="totalSources()"
    [lazy]="true"
    (onLazyLoad)="loadSources($event)"
>
    <ng-template #header>
        <tr>
            <th>Name</th>
            <th>Institution</th>
            <th>Notes</th>
            <th>Source Type</th>
            <th>Update</th>
        </tr>
    </ng-template>
    <ng-template #body let-source>
        <tr>
            <td>{{ source.name }}</td>
            <td>{{ source.institution }}</td>
            <td>{{ source.notes }}</td>
            <td>{{ source.type | sourceTypeLabel }}</td>
            <td><p-tableradiobutton [value]="source" (click)="handleUpdate()" /></td>
        </tr>
    </ng-template>
</p-table>

<p-dialog [modal]="true" [(visible)]="showUpdate" [style]="{width: '40rem', height: '40rem'}"> 
    <div>
        <button 
            pButton 
            icon="pi pi-pen-to-square" 
            class="flex-auto whitespace-nowrap" 
            (click)="handleUpdateSource(selectedSource()!)"
        ></button>
    </div>
    <div>
        <button 
            pButton 
            icon="pi pi-trash" 
            outlined 
            class="flex-auto whitespace-nowrap"
            (click)="handleDeleteSource(selectedSource()!)"
        ></button>
    </div>
</p-dialog>

<p-dialog
    [header]="dialogTitle()"
    [modal]="true"
    [visible]="showDialog()"
    [style]="{width: '40rem', height: '40rem'}"
>
    <form
        [formGroup]="form"
        (ngSubmit)="saveSource()"
    >
        <div><input id="souce-name" formControlName="name" type="text" /><label for="source-name">Name</label></div>
        <div><input id="souce-institution" formControlName="institution" type="text" /><label for="source-institution">Institution</label></div>
        <div><input id="souce-notes" formControlName="notes" type="text" /><label for="source-notes">Notes</label></div>
        <div><p-select id="souce-type" formControlName="type" [options]="sourceTypeOptions"></p-select><label for="source-type">Source Type</label></div>

        <p-button 
            label="Cancel" 
            type="button" 
            severity="secondary" 
            [outlined]="true"  
            (onClick)="showDialog.set(false)"
            class="p-2 w-full"
        />

        <p-button 
            label="Save" 
            type="submit"   
            [disabled]="form.invalid"   
            class="p-2 w-full"
        />
    </form>
</p-dialog>
