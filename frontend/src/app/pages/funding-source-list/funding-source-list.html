<div class="dash">
  <app-side-bar />

  <div class="content">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="funding-source-list_title">Funding Sources</h1>
        <p>The accounts your contributions come from.</p>
      </div>
      <p-button label="Create New Funding Source" (click)="handleCreateSource()" />
    </div>

    <div class="source-card-grid">
      @for (source of allSources(); track source.id) {
        <app-source-card
          [source]="source"
          (open)="goToSource($event)"
          (edit)="handleUpdateSource($event)"
          (delete)="handleDeleteSource($event)"
        />
      } @empty {
        <p>No funding sources yet.</p>
      }
    </div>

    <app-funding-source-form
        [(visible)]="showDialog"
        [source]="selectedSource()"
        (save)="handleSaveSource($event)"
    />

    <p-confirmdialog />
  </div>
</div>
